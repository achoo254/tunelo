# /etc/nginx/sites-available/tunelo
# Tunelo wildcard subdomain proxy config

# Required for WebSocket upgrade — only set "upgrade" when client sends Upgrade header
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name tunnel.inetdev.io.vn *.tunnel.inetdev.io.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tunnel.inetdev.io.vn *.tunnel.inetdev.io.vn;

    ssl_certificate /etc/letsencrypt/live/tunnel.inetdev.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tunnel.inetdev.io.vn/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pass original headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for WS connections (24h)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Streaming support
        proxy_buffering off;
    }
}
